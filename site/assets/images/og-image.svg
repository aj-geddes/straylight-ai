<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="600" ry="400" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="476" y="180" width="64" height="64" rx="14" fill="#4f46e5"/>
  <path d="M486 232 L508 192 L530 232" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="508" cy="192" r="5" fill="#a5b4fc"/>
  <line x1="497" y1="221" x2="519" y2="221" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>

  <!-- Product name -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-1">Straylight-AI</text>

  <!-- Tagline -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="rgba(148,163,184,1)">Zero-knowledge credential proxy for AI agents</text>

  <!-- Slogan -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#818cf8">Use AI, with Zero trust.</text>

  <!-- Bottom badges -->
  <rect x="380" y="440" width="130" height="36" rx="18" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.4)" stroke-width="1"/>
  <text x="445" y="463" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">Open Source</text>

  <rect x="530" y="440" width="130" height="36" rx="18" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.4)" stroke-width="1"/>
  <text x="595" y="463" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">MIT License</text>

  <rect x="680" y="440" width="130" height="36" rx="18" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.4)" stroke-width="1"/>
  <text x="745" y="463" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a5b4fc">Self-Hosted</text>

  <!-- Footer URL -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="rgba(100,116,139,1)">github.com/straylight-ai/straylight</text>
</svg>
